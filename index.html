<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chaos Drops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
      color: #fff;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 12px 16px;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }
    .header {
      display: flex;
      justify-content: space-between;
      width: 100%;
      align-items: center;
      margin-bottom: 16px;
    }
    .header-btn {
      font-size: 13px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .header-btn:active { background: rgba(255,255,255,0.2); }
    .title {
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      background: linear-gradient(to bottom, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    .drop-counter {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 2px;
      margin-bottom: 24px;
    }
    .drop-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      min-height: 200px;
    }
    .drop-box {
      width: 140px;
      height: 165px;
      background: radial-gradient(ellipse at center, #6b3fa0 0%, #4a1f7a 40%, #2d1050 100%);
      border-radius: 18px;
      border: 3px solid #9b59b6;
      box-shadow: 0 0 30px rgba(155, 89, 182, 0.4), inset 0 -5px 10px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s;
    }
    .drop-box:active { transform: scale(0.95); }
    .drop-box.disabled {
      pointer-events: none;
      opacity: 0.7;
    }
    .drop-box.waiting .drop-box-label {
      animation: pulse 0.6s ease-in-out infinite alternate;
      background: #ffd700;
      color: #1a0a2e;
    }

    /* --- Split Boxes --- */
    .split-boxes {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 10px;
    }
    .split-boxes.active {
      display: flex;
    }
    .split-box {
      width: 70px;
      height: 82px;
      background: radial-gradient(ellipse at center, #6b3fa0 0%, #4a1f7a 40%, #2d1050 100%);
      border-radius: 12px;
      border: 2px solid #9b59b6;
      box-shadow: 0 0 15px rgba(155, 89, 182, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 28px;
      transition: transform 0.1s, box-shadow 0.3s, background 0.3s, border-color 0.3s;
      position: relative;
    }
    .split-box:active { transform: scale(0.93); }
    .split-box.disabled {
      pointer-events: none;
      opacity: 0.5;
    }
    .split-box.waiting {
      animation: pulse 0.6s ease-in-out infinite alternate;
    }
    .split-box.revealed {
      opacity: 0.3;
      pointer-events: none;
      filter: grayscale(0.5);
    }
    @keyframes splitAppear {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* --- Rarity Tier Label --- */
    .rarity-tier-label {
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      min-height: 24px;
      margin-bottom: 4px;
      transition: color 0.3s;
    }
    .drop-box-icon { font-size: 56px; }
    .drop-box-label {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      background: #9b59b6;
      padding: 3px 12px;
      border-radius: 12px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .rarity-bar {
      display: flex;
      gap: 4px;
      margin: 24px 0 4px;
    }
    .rarity-bar span {
      height: 5px;
      border-radius: 3px;
      flex: 1;
    }
    .rarity-labels {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }
    .rarity-labels span {
      flex: 1;
      text-align: center;
      font-size: 9px;
      color: #666;
    }
    .recent-section {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 12px;
    }
    .recent-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .recent-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .recent-row::-webkit-scrollbar { display: none; }
    .recent-item {
      min-width: 56px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
      font-size: 11px;
    }
    .recent-item-icon { font-size: 20px; margin-bottom: 2px; }
    .recent-item-name { font-size: 9px; color: #aaa; white-space: nowrap; }
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: none;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: linear-gradient(135deg, #1e0f35, #2a1848);
      border: 1px solid rgba(155,89,182,0.3);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      margin-top: 20px;
    }
    .modal h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
      text-align: center;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 24px;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
    }
    .reveal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 150;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
    }
    .reveal-overlay.active { display: flex; }
    .reveal-rarity-text {
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 16px;
      opacity: 0;
    }
    .reveal-item-icon { font-size: 72px; opacity: 0; }
    .reveal-item-name {
      font-size: 22px;
      font-weight: 800;
      margin-top: 12px;
      opacity: 0;
    }
    .reveal-item-type {
      font-size: 13px;
      margin-top: 4px;
      opacity: 0;
    }
    .reveal-duplicate {
      font-size: 11px;
      background: rgba(255,0,0,0.3);
      padding: 3px 10px;
      border-radius: 8px;
      margin-top: 8px;
      opacity: 0;
      display: none;
    }
    .reveal-tap-hint {
      position: absolute;
      bottom: 40px;
      font-size: 12px;
      color: #555;
      opacity: 0;
    }
    .split-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 48px;
      font-weight: 900;
      z-index: 160;
      text-shadow: 0 0 30px currentColor;
      pointer-events: none;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px) rotate(-1deg); }
      75% { transform: translateX(4px) rotate(1deg); }
    }
    @keyframes shakeHard {
      0%, 100% { transform: translateX(0); }
      10% { transform: translateX(-6px) rotate(-2deg); }
      30% { transform: translateX(5px) rotate(1.5deg); }
      50% { transform: translateX(-7px) rotate(-2.5deg); }
      70% { transform: translateX(6px) rotate(2deg); }
      90% { transform: translateX(-4px) rotate(-1deg); }
    }
    @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
    @keyframes slamIn {
      0% { transform: scale(3); opacity: 0; }
      60% { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes zoomIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes flash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-8px, -5px); }
      20% { transform: translate(7px, 6px); }
      30% { transform: translate(-6px, 4px); }
      40% { transform: translate(5px, -7px); }
      50% { transform: translate(-4px, 5px); }
      60% { transform: translate(6px, -4px); }
      70% { transform: translate(-5px, 3px); }
      80% { transform: translate(4px, -6px); }
      90% { transform: translate(-3px, 5px); }
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    .stat-row .label { color: #aaa; }
    .stat-row .value { font-weight: 700; }
    .bar-chart { margin: 12px 0; }
    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .bar-row .bar-label { width: 70px; color: #aaa; }
    .bar-row .bar-track {
      flex: 1;
      height: 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 7px;
      overflow: hidden;
      margin: 0 8px;
    }
    .bar-row .bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width 0.3s;
    }
    .bar-row .bar-count { width: 35px; text-align: right; color: #ccc; }
    .collection-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .collection-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .collection-item.locked {
      opacity: 0.3;
      filter: grayscale(1);
    }
    .collection-item-icon { font-size: 24px; }
    .collection-item-name { font-size: 9px; color: #aaa; margin-top: 2px; }
    .luck-meter {
      margin: 12px 0;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
    }
    .luck-meter h4 { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .btn-danger {
      background: rgba(231, 76, 60, 0.2);
      border: 1px solid rgba(231, 76, 60, 0.4);
      color: #e74c3c;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 16px;
      width: 100%;
    }
    .btn-danger:active { background: rgba(231, 76, 60, 0.4); }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s;
    }
    .tab.active { color: #fff; border-bottom-color: #9b59b6; }
  </style>
</head>

    { id: 'buf1', name: 'Buffie',  type: 'Buffie', icon: '🧸', rarities: [4] },
  ];

  const COLLECTIBLE_TYPES = ['Brawler', 'Gadget', 'Star Power', 'Hypercharge', 'Skin', 'Buffie'];

  const DUPLICATE_FALLBACKS = [
    { name: '100 Bling',    icon: '💎' },
    { name: '150 Bling',    icon: '💎' },
    { name: '250 Bling',    icon: '💎' },
    { name: '500 Credits',  icon: '🎫' },
    { name: '1500 Credits', icon: '🎫' },
  ];

  // ============================================================
  // STATE
  // ============================================================

  const STORAGE_KEY = 'chaosDrops';

  function defaultState() {
    return {
      totalDrops: 0,
      rarityCount: [0, 0, 0, 0, 0],
      splitCount: { 1: 0, 2: 0, 4: 0, 8: 0 },
      bestDrop: null,
      collection: {},
      recentDrops: [],
      soundOn: true,
    };
  }

  let state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        return { ...defaultState(), ...saved };
      }
    } catch (e) { /* corrupted data, start fresh */ }
    return defaultState();
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.warn('Failed to save state:', e);
    }
  }

  function resetState() {
    state = defaultState();
    saveState();
    updateUI();
  }

  function recordDrop(rarityIndex, splitCount, rewards) {
    state.totalDrops += rewards.length;
    state.rarityCount[rarityIndex] += rewards.length;
    state.splitCount[splitCount] = (state.splitCount[splitCount] || 0) + 1;

    if (!state.bestDrop ||
        rarityIndex > state.bestDrop.rarityIndex ||
        (rarityIndex === state.bestDrop.rarityIndex && splitCount > state.bestDrop.splitCount)) {
      state.bestDrop = { rarityIndex, splitCount };
    }

    for (const r of rewards) {
      state.recentDrops.unshift(r);
    }
    state.recentDrops = state.recentDrops.slice(0, 10);

    for (const r of rewards) {
      if (COLLECTIBLE_TYPES.includes(r.type) && !r.isDuplicate) {
        state.collection[r.id] = { dropNumber: state.totalDrops };
      }
    }

    saveState();
  }

  // ============================================================
  // RNG
  // ============================================================

  function weightedRandom(items, getWeight) {
    const total = items.reduce((sum, item) => sum + getWeight(item), 0);
    let roll = Math.random() * total;
    for (const item of items) {
      roll -= getWeight(item);
      if (roll <= 0) return item;
    }
    return items[items.length - 1];
  }

  function rollRarity() {
    return RARITIES.indexOf(weightedRandom(RARITIES, r => r.chance));
  }

  function rollSplit() {
    return weightedRandom(SPLITS, s => s.chance).count;
  }

  function getRewardsForRarity(rarityIndex) {
    return REWARDS.filter(r => r.rarities.includes(rarityIndex));
  }

  function pickReward(rarityIndex) {
    const pool = getRewardsForRarity(rarityIndex);
    if (pool.length === 0) return null;

    const reward = pool[Math.floor(Math.random() * pool.length)];
    const isCollectible = COLLECTIBLE_TYPES.includes(reward.type);
    const isDuplicate = isCollectible && state.collection[reward.id];

    if (isDuplicate) {
      const fallback = DUPLICATE_FALLBACKS[rarityIndex];
      return {
        id: reward.id,
        name: fallback.name,
        type: 'Fallback',
        icon: fallback.icon,
        rarityIndex,
        isDuplicate: true,
        originalName: reward.name,
        originalType: reward.type,
      };
    }

    return {
      id: reward.id,
      name: reward.name,
      type: reward.type,
      icon: reward.icon,
      rarityIndex,
      isDuplicate: false,
    };
  }

  function performDrop() {
    const rarityIndex = rollRarity();
    const splitCount = rollSplit();
    const rewards = [];
    for (let i = 0; i < splitCount; i++) {
      rewards.push(pickReward(rarityIndex));
    }
    return { rarityIndex, splitCount, rewards };
  }

const particleCanvas = document.getElementById('particles');
const pCtx = particleCanvas.getContext('2d');
let particles = [];
let particleAnimId = null;
const MAX_PARTICLES = 300;

function resizeCanvas() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor(x, y, color, opts = {}) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.size = opts.size || (Math.random() * 4 + 2);
    this.speedX = opts.speedX || (Math.random() - 0.5) * 8;
    this.speedY = opts.speedY || (Math.random() - 0.5) * 8;
    this.life = opts.life || 1;
    this.decay = opts.decay || (Math.random() * 0.02 + 0.01);
    this.gravity = opts.gravity || 0;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.speedY += this.gravity;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function startParticleLoop() {
  if (particleAnimId) return;
  function loop() {
    pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    particles = particles.filter(p => p.life > 0);
    if (particles.length > MAX_PARTICLES) {
      particles = particles.slice(particles.length - MAX_PARTICLES);
    }
    for (const p of particles) {
      p.update();
      p.draw(pCtx);
    }
    pCtx.globalAlpha = 1;
    if (particles.length > 0) {
      particleAnimId = requestAnimationFrame(loop);
    } else {
      particleAnimId = null;
      pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
    }
  }
  particleAnimId = requestAnimationFrame(loop);
}

function emitBurst(x, y, color, count = 30) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = Math.random() * 6 + 2;
    particles.push(new Particle(x, y, color, {
      speedX: Math.cos(angle) * speed,
      speedY: Math.sin(angle) * speed,
      size: Math.random() * 5 + 1,
      decay: Math.random() * 0.015 + 0.008,
      gravity: 0.05,
    }));
  }
  startParticleLoop();
}

function emitSwirl(targetX, targetY, color, duration = 1000) {
  const interval = 30;
  let elapsed = 0;
  const id = setInterval(() => {
    elapsed += interval;
    if (elapsed >= duration) { clearInterval(id); return; }
    const angle = Math.random() * Math.PI * 2;
    const dist = 150 + Math.random() * 80;
    const startX = targetX + Math.cos(angle) * dist;
    const startY = targetY + Math.sin(angle) * dist;
    const dx = targetX - startX;
    const dy = targetY - startY;
    const steps = 40 + Math.random() * 20;
    particles.push(new Particle(startX, startY, color, {
      speedX: dx / steps,
      speedY: dy / steps,
      size: Math.random() * 3 + 1,
      life: 1,
      decay: 1 / steps,
    }));
    startParticleLoop();
  }, interval);
  return id;
}

function emitFlash(color) {
  const cx = particleCanvas.width / 2;
  const cy = particleCanvas.height / 2;
  for (let i = 0; i < 60; i++) {
    const angle = (Math.PI * 2 * i) / 60;
    const speed = Math.random() * 12 + 6;
    particles.push(new Particle(cx, cy, color, {
      speedX: Math.cos(angle) * speed,
      speedY: Math.sin(angle) * speed,
      size: Math.random() * 6 + 2,
      decay: Math.random() * 0.01 + 0.006,
      gravity: 0,
    }));
  }
  startParticleLoop();
}

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.3, delay = 0) {
  if (!state.soundOn) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration);
}

function playNoise(duration, volume = 0.2, delay = 0) {
  if (!state.soundOn) return;
  const ctx = getAudioCtx();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  source.connect(gain);
  gain.connect(ctx.destination);
  source.start(ctx.currentTime + delay);
}

function playSweep(startFreq, endFreq, duration, type = 'sine', volume = 0.2, delay = 0) {
  if (!state.soundOn) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(startFreq, ctx.currentTime + delay);
  osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + delay + duration);
  gain.gain.setValueAtTime(0.001, ctx.currentTime);
  if (delay > 0) gain.gain.setValueAtTime(0.001, ctx.currentTime + delay - 0.001);
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration);
}

function createReverb(duration = 1.5) {
  const ctx = getAudioCtx();
  const length = ctx.sampleRate * duration;
  const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
    }
  }
  const convolver = ctx.createConvolver();
  convolver.buffer = impulse;
  return convolver;
}

function playToneWithReverb(freq, duration, type = 'sine', volume = 0.3, delay = 0, reverbDuration = 1.5) {
  if (!state.soundOn) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const reverb = createReverb(reverbDuration);
  const reverbGain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  reverbGain.gain.setValueAtTime(0.4, ctx.currentTime);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.connect(reverb);
  reverb.connect(reverbGain);
  reverbGain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function getDropBoxCenter() {
  const rect = dropBox.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

async function animateChargeUp(rarityIndex) {
  const color = RARITIES[rarityIndex].color;
  const center = getDropBoxCenter();
  const swirlId = emitSwirl(center.x, center.y, color, 900);

async function animateSplitCheck(splitCount, rarityIndex) {
  const color = RARITIES[rarityIndex].color;
  const center = getDropBoxCenter();
  if (splitCount > 1) {
    Sound.split(splitCount);
    emitBurst(center.x, center.y, color, 40);

    splitTextEl.style.transition = 'opacity 0.3s';
    splitTextEl.style.opacity = '0';

    splitTextEl.style.display = 'none';

    Sound.crack();
    emitBurst(center.x, center.y, color, 10);

function setDropLabel(text) {

const rarityTierLabel = document.getElementById('rarityTierLabel');
const splitBoxesContainer = document.getElementById('splitBoxes');

function setTierLabel(tierIndex) {

  rarityTierLabel.textContent = `★ ${r.name} ★`;
  rarityTierLabel.style.color = r.color;
  rarityTierLabel.style.textShadow = `0 0 15px ${r.color}`;
}

  box.style.borderColor = r.color;
  box.style.boxShadow = `0 0 ${r.glowSize}px ${r.color}`;

// Rarity escalation: step through each tier up to the final rarity, one tap per step
async function escalateRarity(box, finalRarityIndex) {
  const center = box.getBoundingClientRect();
  const cx = center.left + center.width / 2;
  const cy = center.top + center.height / 2;

  for (let tier = 0; tier <= finalRarityIndex; tier++) {
    // Style box for current tier
    styleBoxForTier(box, tier);
    setTierLabel(tier);
    Sound.rarityReveal(tier);

    // Screen effects for high rarities
    if (tier >= 3) {
      emitFlash(RARITIES[tier].color);
      document.getElementById('app').style.animation = 'screenShake 0.4s';
      await sleep(400);
      document.getElementById('app').style.animation = '';
    } else if (tier >= 2) {
      emitBurst(cx, cy, RARITIES[tier].color, 25);
      document.getElementById('app').style.animation = 'screenShake 0.2s';
      await sleep(200);
      document.getElementById('app').style.animation = '';
    }

    if (tier < finalRarityIndex) {
      // Not at final tier yet — wait for tap to upgrade
      await sleep(300);
      box.classList.remove('disabled');
      box.classList.add('waiting');
      await waitForTap(box);
      box.classList.remove('waiting');
      box.classList.add('disabled');
      Sound.uiClick();
      emitBurst(cx, cy, RARITIES[tier + 1].color, 15);
      await sleep(100);
    } else {
      // Reached final tier
      await sleep(400);
    }
  }
}

function createSplitBoxes(count) {
  splitBoxesContainer.innerHTML = '';
  const boxes = [];
  for (let i = 0; i < count; i++) {
    const box = document.createElement('div');
    box.className = 'split-box disabled';
    box.textContent = '🎁';
    box.style.animation = `splitAppear 0.3s ${i * 0.1}s both`;
    splitBoxesContainer.appendChild(box);
    boxes.push(box);
  }
  splitBoxesContainer.classList.add('active');
  return boxes;
}

function clearSplitBoxes() {
  splitBoxesContainer.classList.remove('active');
  splitBoxesContainer.innerHTML = '';
}

async function openDrop() {
  if (isAnimating) return;
  isAnimating = true;
  dropBox.classList.add('disabled');
  const drop = performDrop();
  const { rarityIndex, splitCount, rewards } = drop;

  // Phase 1: Charge Up (auto-plays)
  await animateChargeUp(rarityIndex);

  // Wait for tap to crack open
  setDropLabel('Tap to Crack');
  dropBox.classList.remove('disabled');
  dropBox.classList.add('waiting');
  await waitForTap(dropBox);
  dropBox.classList.remove('waiting');
  dropBox.classList.add('disabled');
  Sound.uiClick();

  // Phase 2: Split Check
  await animateSplitCheck(splitCount, rarityIndex);

  if (splitCount === 1) {
    // Single drop: escalate rarity on the main drop box, then reveal
    dropBox.style.animation = 'none';
    await escalateRarity(dropBox, rarityIndex);

    // Wait for tap to reveal reward
    setDropLabel('Tap to Reveal');
    dropBox.classList.remove('disabled');
    dropBox.classList.add('waiting');
    await waitForTap(dropBox);
    dropBox.classList.remove('waiting');
    dropBox.classList.add('disabled');
    Sound.uiClick();
    clearTierLabel();
    await animateRewardReveal(rewards[0], rarityIndex);

  } else {
    // Multi-split: hide main box, show split boxes
    dropBox.style.display = 'none';
    const boxes = createSplitBoxes(splitCount);
    await sleep(300 + splitCount * 100); // wait for appear animations

    // Process each split box
    for (let i = 0; i < boxes.length; i++) {
      const box = boxes[i];

      // Escalate rarity on this box
      await escalateRarity(box, rarityIndex);

      // Wait for tap to reveal
      box.classList.remove('disabled');
      box.classList.add('waiting');
      await waitForTap(box);
      box.classList.remove('waiting');
      box.classList.add('disabled');
      Sound.uiClick();
      clearTierLabel();

      // Show reward
      await animateRewardReveal(rewards[i], rarityIndex);

      // Mark as revealed
      box.classList.add('revealed');
      box.textContent = rewards[i].icon;
    }

    // Clean up split view
    await sleep(300);
    clearSplitBoxes();
    dropBox.style.display = '';
  }

  recordDrop(rarityIndex, splitCount, rewards);
  resetDropBox();
  setDropLabel('Tap to Open');
  clearTierLabel();
  updateUI();
  dropBox.classList.remove('disabled');
  isAnimating = false;
}
  // ============================================================
  // UI
  // ============================================================

  function updateUI() {
    document.getElementById('dropCount').textContent = state.totalDrops;
    document.getElementById('soundToggle').textContent = state.soundOn ? '🔊 Sound' : '🔇 Muted';
    const recentRow = document.getElementById('recentRow');
    if (state.recentDrops.length === 0) {
      recentRow.innerHTML = '<div style="color:#555; font-size:12px; padding:8px;">No drops yet — tap the box!</div>';
    } else {
      recentRow.innerHTML = state.recentDrops.map(r => {
        const color = RARITIES[r.rarityIndex].color;
        return `<div class="recent-item" style="border-color: ${color}33; background: ${color}15;">
          <div class="recent-item-icon">${r.icon}</div>
          <div class="recent-item-name" style="color: ${color};">${r.name}</div>
        </div>`;
      }).join('');
    }
  }

  function renderStats() {
    const content = document.getElementById('statsContent');
    const total = Math.max(state.totalDrops, 1);
    const bestDropText = state.bestDrop
      ? `${RARITIES[state.bestDrop.rarityIndex].name} ×${state.bestDrop.splitCount}`
      : 'None yet';
    const collectionCount = Object.keys(state.collection).length;
    const totalCollectibles = REWARDS.filter(r => COLLECTIBLE_TYPES.includes(r.type)).length;
    content.innerHTML = `
      <div class="stat-row"><span class="label">Total Drops</span><span class="value">${state.totalDrops}</span></div>
      <div class="stat-row"><span class="label">Best Drop</span><span class="value">${bestDropText}</span></div>
      <div class="stat-row"><span class="label">Collection</span><span class="value">${collectionCount}/${totalCollectibles}</span></div>
      <h3 style="font-size:14px; margin:16px 0 8px; color:#aaa;">Rarity Distribution</h3>
      <div class="bar-chart">
        ${RARITIES.map((r, i) => {
          const count = state.rarityCount[i];
          const pct = (count / total * 100);
          return `<div class="bar-row">
            <span class="bar-label">${r.name}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%; background:${r.color};"></div>
            </div>
            <span class="bar-count">${count}</span>
          </div>`;
        }).join('')}
      </div>
      <h3 style="font-size:14px; margin:16px 0 8px; color:#aaa;">Luck Meter</h3>
      <div class="luck-meter">
        ${RARITIES.map((r, i) => {
          const actualNum = state.totalDrops > 0 ? (state.rarityCount[i] / state.totalDrops * 100) : 0;
          const expectedNum = r.chance * 100;
          const diffNum = actualNum - expectedNum;
          const diffColor = diffNum > 0.05 ? '#2ecc71' : diffNum < -0.05 ? '#e74c3c' : '#888';
          return `<div style="display:flex; justify-content:space-between; font-size:12px; padding:3px 0;">
            <span style="color:${r.color};">${r.name}</span>
            <span>${actualNum.toFixed(1)}% <span style="color:${diffColor};">(${diffNum > 0 ? '+' : ''}${diffNum.toFixed(1)}%)</span> vs ${expectedNum.toFixed(1)}%</span>
          </div>`;
        }).join('')}
      </div>
      <h3 style="font-size:14px; margin:16px 0 8px; color:#aaa;">Split Distribution</h3>
      <div class="bar-chart">
        ${SPLITS.map(s => {
          const count = state.splitCount[s.count] || 0;
          const totalSplits = Object.values(state.splitCount).reduce((a, b) => a + b, 0) || 1;
          const pct = (count / totalSplits * 100);
          return `<div class="bar-row">
            <span class="bar-label">×${s.count}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%; background:#9b59b6;"></div>
            </div>
            <span class="bar-count">${count}</span>
          </div>`;
        }).join('')}
      </div>
    `;
  }

  function renderCollection() {
    const content = document.getElementById('collectionContent');
    const collectibles = REWARDS.filter(r => COLLECTIBLE_TYPES.includes(r.type));
    content.innerHTML = `
      <div class="collection-grid">
        ${collectibles.map(item => {
          const owned = state.collection[item.id];
          const rarity = RARITIES[item.rarities[0]];
          return `<div class="collection-item ${owned ? '' : 'locked'}"
            style="border-color: ${owned ? rarity.color + '44' : 'rgba(255,255,255,0.1)'};"
            ${owned ? `onclick="alert('${item.name}\\n${item.type}\\n${rarity.name}\\nDrop #${owned.dropNumber}')"` : ''}>
            <div class="collection-item-icon">${owned ? item.icon : '❓'}</div>
            <div class="collection-item-name">${owned ? item.name : '???'}</div>
          </div>`;
        }).join('')}
      </div>
    `;
  }

  dropBox.addEventListener('click', () => {
    Sound.uiClick();
    openDrop();
  });

  document.getElementById('soundToggle').addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    saveState();
    updateUI();
  });

  document.getElementById('statsBtn').addEventListener('click', () => {
    Sound.uiClick();
    renderStats();
    renderCollection();
    document.getElementById('statsModal').classList.add('active');
  });

  document.getElementById('statsClose').addEventListener('click', () => {
    document.getElementById('statsModal').classList.remove('active');
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('statsContent').style.display = target === 'stats' ? 'block' : 'none';
      document.getElementById('collectionContent').style.display = target === 'collection' ? 'block' : 'none';
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Reset all data? This cannot be undone.')) {
      resetState();
      renderStats();
      renderCollection();
    }
  });

  document.getElementById('statsModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('statsModal')) {
      document.getElementById('statsModal').classList.remove('active');
    }
  });

  updateUI();
  </script>
</body>
</html>
